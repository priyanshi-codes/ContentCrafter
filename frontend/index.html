<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/frontend/Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/frontend/src/index.css" rel="stylesheet">
    <link rel="shortcut icon" href="Logo.png" type="image/x-icon">
    <title>Content Crafter</title>
  </head>
  <body>
    <script>
      try {
        if (localStorage.getItem('vite-ui-theme') === 'dark' ||
          (!('vite-ui-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
